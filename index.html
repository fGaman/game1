<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monnett — Find Your Place</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #F73E5A;
  --red-light: #FFF0F2;
  --red-glow: rgba(247,62,90,0.2);
  --bg: #F9F7F4;
  --bg2: #FFFFFF;
  --ink: #1A1A1A;
  --ink2: #4A4A4A;
  --ink3: #9A9A9A;
  --border: #EBEBEB;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  --purple: #8B7FE8;
  --yellow: #FFD600;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

#particles { display:none; }

#app { position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column; align-items:center; }

.screen { display:none; width:100%; max-width:480px; flex-direction:column; align-items:center; min-height:100dvh; padding:0 0 40px; animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
.screen.active { display:flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* INTRO */
#screen-intro { justify-content:center; padding:52px 32px; text-align:center; gap:0; background:var(--bg); }
.intro-logo { width:88px; height:88px; background:var(--red); border-radius:26px; display:flex; align-items:center; justify-content:center; margin:0 auto 44px; box-shadow:0 8px 40px var(--red-glow); }
.intro-title { font-family:'Syne',sans-serif; font-size:clamp(34px,9vw,52px); font-weight:800; line-height:1.06; letter-spacing:-2px; color:var(--ink); margin-bottom:36px; }
.intro-title span { color:var(--red); }
.btn-start { background:var(--red); color:#fff; border:none; border-radius:100px; padding:20px 48px; font-family:'Syne',sans-serif; font-weight:800; font-size:17px; cursor:pointer; box-shadow:0 6px 32px var(--red-glow); transition:transform .18s, box-shadow .18s; width:100%; max-width:320px; }
.btn-start:active { transform:scale(.97); box-shadow:0 2px 12px var(--red-glow); }
.intro-note { margin-top:20px; font-size:12px; color:var(--ink3); letter-spacing:.3px; }

/* QUESTION */
#screen-question { padding:0; gap:0; position:relative; background:var(--bg); }
.q-header { width:100%; padding:20px 20px 14px 64px; flex-shrink:0; }
.progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.progress-num { font-family:'Syne',sans-serif; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--red); font-weight:700; }
.progress-pct { font-size:11px; color:var(--ink3); font-family:'Syne',sans-serif; font-weight:600; }
.progress-track { height:3px; background:var(--border); border-radius:100px; overflow:hidden; }
.progress-fill { height:100%; background:var(--red); border-radius:100px; transition:width .5s cubic-bezier(.22,1,.36,1); }
.q-text-wrap { padding:8px 24px 24px; flex-shrink:0; }
.q-text { font-family:'Syne',sans-serif; font-size:clamp(18px,5vw,24px); font-weight:800; line-height:1.2; letter-spacing:-.5px; color:var(--ink); }

/* OPTIONS LIST */
.options-list { width:100%; display:flex; flex-direction:column; gap:10px; flex:1; padding:0 16px; }
.opt-card { background:var(--bg2); border:2px solid var(--border); border-radius:18px; cursor:pointer; display:flex; flex-direction:row; align-items:center; transition:border-color .15s, background .15s, box-shadow .15s; animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both; position:relative; overflow:hidden; box-shadow:var(--shadow); }
.opt-card:nth-child(1){animation-delay:.04s}
.opt-card:nth-child(2){animation-delay:.10s}
.opt-card:nth-child(3){animation-delay:.16s}
.opt-card:active { transform:scale(.99); }
.opt-card.selected { border-color:var(--red); background:var(--red-light); box-shadow:0 4px 20px var(--red-glow); }
.opt-card.selected::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--red); border-radius:4px 0 0 4px; }
.opt-illus { width:100px; height:100px; flex-shrink:0; overflow:hidden; background:var(--bg); border-radius:0 0 0 16px; }
.opt-illus svg { width:100%; height:100%; display:block; }
.opt-label { padding:14px 14px 14px 16px; font-family:'Syne',sans-serif; font-size:clamp(13px,3.8vw,16px); font-weight:700; line-height:1.3; letter-spacing:-.2px; color:var(--ink); flex:1; }
.opt-card.selected .opt-label { color:var(--ink); }

/* BACK BUTTON */
.btn-back { position:absolute; top:18px; left:16px; width:40px; height:40px; background:var(--bg2); border:2px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; transition:background .15s, border-color .15s; box-shadow:var(--shadow); }
.btn-back:active { background:var(--border); }
.btn-back svg { display:block; }

/* CHECKBOX */
.opt-check { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; margin-right:16px; display:flex; align-items:center; justify-content:center; transition:all .18s; background:var(--bg); }
.opt-card.selected .opt-check { background:var(--red); border-color:var(--red); }
.opt-check-tick { width:10px; height:10px; opacity:0; transition:opacity .15s; }
.opt-card.selected .opt-check-tick { opacity:1; }

/* NEXT BUTTON */
.q-footer { width:100%; padding:16px 16px 32px; flex-shrink:0; }
.btn-next { background:var(--red); color:#fff; border:none; border-radius:100px; padding:18px 36px; width:100%; font-family:'Syne',sans-serif; font-weight:800; font-size:16px; cursor:pointer; box-shadow:0 6px 28px var(--red-glow); transition:all .2s; opacity:.3; pointer-events:none; }
.btn-next.enabled { opacity:1; pointer-events:all; }
.btn-next:active { transform:scale(.98); }

/* SORTING */
#screen-sorting { justify-content:center; text-align:center; padding:48px 28px; background:var(--bg); }
.sorting-badge { width:110px; height:110px; background:var(--red); border-radius:32px; display:flex; align-items:center; justify-content:center; margin:0 auto 36px; animation:sortSpin 1.2s ease-in-out infinite alternate; box-shadow:0 8px 48px var(--red-glow); }
@keyframes sortSpin { from{transform:scale(1) rotate(-4deg)} to{transform:scale(1.08) rotate(4deg)} }
.sorting-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--ink); margin-bottom:10px; }
.sorting-sub { font-size:14px; color:var(--ink3); }
.dots { animation:blink 1.1s steps(3,end) infinite; }
@keyframes blink { 0%,100%{opacity:1} 33%{opacity:0} }

/* RESULT */
#screen-result { justify-content:flex-start; text-align:center; padding:0 0 48px; background:var(--bg); }
.result-hero { width:100%; background:var(--red); padding:56px 24px 44px; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; }
.result-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% -10%,rgba(255,255,255,.18) 0%,transparent 65%); }
.result-icon { font-size:60px; margin-bottom:14px; animation:badgeDrop .6s cubic-bezier(.34,1.56,.64,1) both; position:relative; z-index:1; }
@keyframes badgeDrop { from{transform:scale(0) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
.result-eyebrow { font-family:'Syne',sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.7); margin-bottom:10px; animation:fadeUp .4s .3s both; position:relative; z-index:1; }
.result-name { font-family:'Syne',sans-serif; font-size:clamp(28px,8vw,42px); font-weight:800; letter-spacing:-1px; line-height:1.05; color:#fff; animation:fadeUp .4s .4s both; position:relative; z-index:1; }
.result-body { padding:28px 20px 0; display:flex; flex-direction:column; gap:16px; width:100%; }
.result-desc { font-size:15px; color:var(--ink2); line-height:1.75; animation:fadeUp .4s .5s both; }
.result-card { background:var(--bg2); border:1.5px solid var(--border); border-left:4px solid var(--red); border-radius:16px; padding:18px 20px; font-size:14px; color:var(--ink2); line-height:1.7; text-align:left; animation:fadeUp .4s .6s both; box-shadow:var(--shadow); }
.result-card strong { color:var(--ink); }
.result-pillars { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start; animation:fadeUp .4s .7s both; }
.pill { background:var(--bg2); border:1.5px solid var(--border); border-radius:100px; padding:8px 16px; font-size:12px; color:var(--ink2); font-family:'Syne',sans-serif; font-weight:600; box-shadow:var(--shadow); }
.cta-section { padding:24px 20px 0; width:100%; animation:fadeUp .4s .85s both; display:flex; flex-direction:column; align-items:center; gap:0; }
.btn-cta { background:var(--red); color:#fff; border:none; border-radius:100px; padding:20px 36px; width:100%; font-family:'Syne',sans-serif; font-weight:800; font-size:16px; cursor:pointer; box-shadow:0 6px 32px var(--red-glow); transition:all .2s; margin-bottom:12px; }
.btn-cta:active { transform:scale(.98); }
.btn-restart { background:transparent; color:var(--ink3); border:1.5px solid var(--border); border-radius:100px; padding:14px 36px; width:100%; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s; margin-top:4px; }
.btn-restart:active { background:var(--border); }
.btn-stats { background:none; border:none; color:var(--ink3); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; margin-top:18px; text-decoration:underline; text-underline-offset:3px; transition:color .2s; }
.btn-stats:hover { color:var(--ink2); }
.cta-note { font-size:12px; color:var(--ink3); text-align:center; margin-top:16px; }
.cta-note span { color:var(--ink2); }

/* STATS SCREEN */
#screen-stats { justify-content:flex-start; padding:0 0 48px; min-height:100dvh; background:var(--bg); }
.stats-header { width:100%; padding:20px 20px 18px 64px; position:relative; display:flex; align-items:center; border-bottom:1.5px solid var(--border); flex-shrink:0; background:var(--bg2); }
.stats-header .btn-back { position:absolute; left:16px; top:50%; transform:translateY(-50%); }
.stats-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--ink); }
.stats-body { width:100%; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:32px; }
.stats-total { font-family:'Syne',sans-serif; font-size:14px; color:var(--ink3); letter-spacing:.3px; text-align:center; }
.stats-total span { color:var(--ink); font-size:28px; font-weight:800; display:block; margin-bottom:4px; }
#pie-chart { display:block; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.08)); }
.stats-legend { width:100%; display:flex; flex-direction:column; gap:14px; }
.legend-row { display:flex; align-items:center; gap:10px; }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.legend-label { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--ink); flex:1; }
.legend-pct { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:var(--ink); }
.legend-bar-wrap { width:100%; height:5px; background:var(--border); border-radius:100px; margin-top:5px; }
.legend-bar { height:100%; border-radius:100px; transition:width .8s cubic-bezier(.22,1,.36,1); }
</style>
</head>
<body>
<div id="particles"></div>
<div id="app">

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-logo">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <path d="M5 37V13L22 29L39 13V37" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 class="intro-title">The internet<br>got <span>broken.</span><br>Find your place.</h1>
  <button class="btn-start" onclick="startGame()">Begin the sorting →</button>
  <p class="intro-note">~2 minutes · Made &amp; hosted in Europe 🇪🇺</p>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <button class="btn-back" id="btn-back" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M11 4L6 9L11 14" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="q-header">
    <div class="progress-row">
      <span class="progress-num" id="q-label">01 of 07</span>
      <span class="progress-pct" id="q-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="q-text-wrap"><div class="q-text" id="q-text"></div></div>
  <div class="options-list" id="options-grid"></div>
  <div class="q-footer"><button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button></div>
</div>

<!-- SORTING -->
<div class="screen" id="screen-sorting">
  <div class="sorting-badge">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
      <path d="M7 50V16L30 38L53 16V50" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="sorting-title">Sorting you<span class="dots">...</span></div>
  <div class="sorting-sub">Finding your place in Monnett</div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-hero">
    <div class="result-icon" id="result-icon">🧭</div>
    <div class="result-eyebrow">You've been sorted</div>
    <div class="result-name" id="result-name">The Signal Seeker</div>
  </div>
  <div class="result-body">
    <div class="result-desc" id="result-desc"></div>
    <div class="result-card" id="result-card"></div>
    <div class="result-pillars" id="result-pillars"></div>
  </div>
  <div class="cta-section">
    <button class="btn-cta">Add my badge &amp; join Monnett →</button>
    <button class="btn-restart" onclick="startGame()">↩ Sort me again</button>
    <div class="cta-note">Free to join · <span>Membership from €2.99/mo</span> · 🇪🇺 Europe</div>
    <button class="btn-stats" onclick="showStats()">See who else took this quiz →</button>
  </div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="stats-header">
    <button class="btn-back" onclick="showScreen('screen-result')">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9L11 14" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="stats-title">Who's taking this quiz</div>
  </div>
  <div class="stats-body">
    <div class="stats-total" id="stats-total">— people sorted so far</div>
    <canvas id="pie-chart" width="260" height="260"></canvas>
    <div class="stats-legend" id="stats-legend"></div>
  </div>
</div>

</div>

// PARTICLES
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<16;i++){

    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*12}s`;

})();

let qIndex=0, selectedSet=new Set(), scores={noise:0,connection:0,memory:0,explorer:0,trust:0};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById(id);
  el.style.display='flex';
  el.style.animation='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.animation='';el.classList.add('active');}));
}

function startGame(){
  qIndex=0; selectedSet=new Set();
  scores={noise:0,connection:0,memory:0,explorer:0,trust:0};
  renderQ(); showScreen('screen-question');
}

function goBack(){
  if(qIndex===0){ showScreen('screen-intro'); return; }
  qIndex--;
  // reverse scores for previously selected answers on this question
  // (simplest approach: just re-render, scores already applied — we flag this)
  renderQ();
}

function renderQ(){
  selectedSet=new Set();
  const q=questions[qIndex];
  const pct=Math.round(qIndex/questions.length*100);
  document.getElementById('q-label').textContent=String(qIndex+1).padStart(2,'0')+' of '+String(questions.length).padStart(2,'0');
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('q-text').textContent=q.text;
  const btn=document.getElementById('btn-next');
  btn.classList.remove('enabled');
  const list=document.getElementById('options-grid');
  list.innerHTML='';
  q.options.forEach((opt,i)=>{
    const card=document.createElement('div'); card.className='opt-card';
    card.style.animationDelay=(i*0.07)+'s';
    // illustration
    const illus=document.createElement('div'); illus.className='opt-illus';
    illus.innerHTML=SVG[opt.svg]||'<svg viewBox="0 0 300 300"><rect width="300" height="300" fill="#222"/></svg>';
    // label
    const label=document.createElement('div'); label.className='opt-label'; label.textContent=opt.label;
    // checkbox
    const chk=document.createElement('div'); chk.className='opt-check';
    chk.innerHTML=`<svg class="opt-check-tick" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    card.appendChild(illus); card.appendChild(label); card.appendChild(chk);
    card.addEventListener('click',()=>toggle(card,i));
    list.appendChild(card);
  });
}

function toggle(el,idx){
  if(selectedSet.has(idx)){
    selectedSet.delete(idx);
    el.classList.remove('selected');
  } else {
    selectedSet.add(idx);
    el.classList.add('selected');
  }
  const btn=document.getElementById('btn-next');
  if(selectedSet.size>0) btn.classList.add('enabled');
  else btn.classList.remove('enabled');
}

function nextQ(){
  if(selectedSet.size===0) return;
  // apply scores for all selected
  selectedSet.forEach(idx=>{
    const s=questions[qIndex].options[idx].scores;
    Object.entries(s).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  });
  qIndex++;
  if(qIndex<questions.length){ renderQ(); }
  else { showScreen('screen-sorting'); setTimeout(showResult,2600); }
}

function showResult(){
  const winner=Object.entries(scores).reduce((a,b)=>b[1]>a[1]?b:a)[0];
  const b=badges[winner];
  document.getElementById('result-icon').textContent=b.icon;
  document.getElementById('result-name').textContent=b.name;
  document.getElementById('result-desc').textContent=b.desc;
  document.getElementById('result-card').innerHTML=b.card;
  document.getElementById('result-pillars').innerHTML=b.pillars.map(p=>`<div class="pill">${p}</div>`).join('');
  saveResult(winner);
  showScreen('screen-result');
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwi48BVP7y8bWBbK5hdkGbGKZjldktKQ0YD8bqsMioxOisSfWUujdN4Am2dF7y8nCSD5g/exec';
// ────────────────────────────────────────────────────────────────────────────

async function saveResult(badge){
  try {
    await fetch(SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ badge, ts: new Date().toISOString() })
    });
  } catch(e){ console.warn('Could not save result:', e); }
}

async function showStats(){
  showScreen('screen-stats');
  let tally={noise:0,connection:0,memory:0,explorer:0,trust:0};

  try {
    const res = await fetch(SHEET_URL + '?action=tally');
    const data = await res.json();
    tally = {...tally, ...data};
  } catch(e){ console.warn('Could not load stats:', e); }

  const colors={noise:'#F73E5A',connection:'#8B7FE8',memory:'#FFD600',explorer:'#4FC3F7',trust:'#57C97A'};
  const order=['connection','trust','noise','memory','explorer'];
  const total=order.reduce((s,k)=>s+(tally[k]||0),0);

  const totalEl=document.getElementById('stats-total');
  totalEl.innerHTML=total===0
    ? `No results yet — be the first!`
    : `<span>${total}</span> ${total===1?'person':'people'} sorted so far`;

  const canvas=document.getElementById('pie-chart');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,260,260);
  if(total===0){
    ctx.beginPath(); ctx.arc(130,130,110,0,Math.PI*2);
    ctx.fillStyle='#EBEBEB'; ctx.fill();
  } else {
    let start=-Math.PI/2;
    const gap=0.03;
    order.forEach(k=>{
      const val=tally[k]||0; if(!val) return;
      const slice=(val/total)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(130,130);
      ctx.arc(130,130,110,start+gap/2,start+slice-gap/2);
      ctx.closePath();
      ctx.fillStyle=colors[k];
      ctx.fill();
      start+=slice;
    });
    ctx.beginPath(); ctx.arc(130,130,62,0,Math.PI*2);
    ctx.fillStyle='#F9F7F4'; ctx.fill();
    ctx.fillStyle='#1A1A1A';
    ctx.font='800 28px Syne,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(total,130,126);
    ctx.font='500 12px DM Sans,sans-serif';
    ctx.fillStyle='#9A9A9A';
    ctx.fillText('sorted',130,150);
  }

  const legend=document.getElementById('stats-legend');
  legend.innerHTML='';
  order.forEach(k=>{
    const val=tally[k]||0;
    const pct=total?Math.round(val/total*100):0;
    const b=badges[k];
    const row=document.createElement('div'); row.className='legend-row';
    row.innerHTML=`
      <div style="width:100%">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div class="legend-dot" style="background:${colors[k]}"></div>
          <div class="legend-label">${b.icon} ${b.name}</div>
          <div class="legend-pct">${pct}%</div>
        </div>
        <div class="legend-bar-wrap">
          <div class="legend-bar" style="width:0%;background:${colors[k]}" data-w="${pct}"></div>
        </div>
      </div>`;
    legend.appendChild(row);
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    legend.querySelectorAll('.legend-bar').forEach(b=>{b.style.width=b.dataset.w+'%';});
  }));
}
